<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <!-- font-awsome 라이브러리 가져오기 -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <!-- Bootstrap CSS 디자인, 레이아웃 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <!-- Bootstrap JS 모달, 드롭다운 -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: sans-serif;
            }
            .title {
                text-align: center;
                font-weight: bold;
                font-size: 20pt;
            }
            .todo-done {
                text-decoration: line-through;
            }
            .container {
                padding: 10px 10px 10px 10px;
            }
            .panel-borderless {
                border: 0;
                box-shadow: none;
            }
            .pointer {
                cursor: pointer;
            }
            .
        </style>
    </head>
    <body>
        <div id="app" class="container">
            <div class="card card-body bg-light">
                <div classe="title">:: Todolist App</div>
            </div>
            <div class="card card-default card-borderless">
                <div class="card-body">
                    <!-- Todo 추가 -->
                    <div class="input-group">
                        <!-- @keyup.enter : enter키를 누르면 addTodo 함수 호출 -->
                        <input
                            type="text"
                            v-model.trim="todo"
                            @keyup.enter.exact="addTodo"
                            @keyup.ctrl.enter.exact="addTodo"
                            class="form-control"
                        />
                        <button @click="addTodo" class="btn btn-primary">
                            추가
                        </button>
                    </div>

                    <!-- 할 일 목록-->
                    <!-- Todo 목록 보여주기 -->
                    <ul class="list-group">
                        <li
                            v-for="todoitem in todolist"
                            ::key="todoitem.id"
                            class="list-group-item d-flex"
                            :class="{ 'bg-success': todoitem.completed }"
                        >
                            <div class="d-flex align-items-center gap-2">
                                <input
                                    type="checkbox"
                                    v-model="todoitem.completed"
                                    @click="toggleComplted(todoitem.id)"
                                />
                                <span
                                    :style="{ textDecoration: todoitem.completed ? 'line-through' : 'none' }"
                                    >{{todoitem.todo}} {{todoitem.completed ?
                                    "(완료)" : ""}}</span
                                >
                            </div>

                            <!-- 삭제하기 -->
                            <button
                                @click="deleteTodo(todoitem.id)"
                                class="btn btn-secondary ms-auto"
                            >
                                삭제
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <script>
            const { createApp, ref } = Vue;

            let ts = new Date().getTime();

            /* TODO:: 완료미완료 정렬, 미완료 텍스트 정렬 */
            createApp({
                setup() {
                    const todo = ref(""); // 새로추가되는 todo
                    const todolist = ref([
                        { id: ts, todo: "자전거 타기", completed: false },
                        { id: ts + 1, todo: "딸과 공원 산책", completed: true },
                        {
                            id: ts + 2,
                            todo: "일요일 애견 카페",
                            completed: false,
                        },
                        { id: ts + 3, todo: "Vue 원고 집필", completed: false },
                    ]);

                    const deleteTodo = (id) => {
                        // findIndex(콜백) : 콜백함수가 true를 반환하는 첫번째 요소의 인덱스를 반환
                        let index = todolist.value.findIndex(
                            (item) => id === item.id,
                        );

                        // splice(인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소를 삭제
                        todolist.value.splice(index, 1);
                    };

                    // 완료상태 토글 기능
                    const toggleComplted = (id) => {
                        // findIndex(콜백) : 콜백함수가 true를 반환하는 첫번째 요소의 인덱스를 반환
                        let index = todolist.value.findIndex(
                            (item) => id === item.id,
                        );

                        // splice(인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소를 삭제
                        todolist.value[index].completed =
                            !todolist.value[index].completed;
                    };

                    // create todo
                    const addTodo = (e) => {
                        // 빈문자열 예외처리
                        if (todo.value === "") return;

                        // 배열에 추가
                        todolist.value.push({
                            id: new Date().getTime(),
                            todo: todo.value,
                            // ctrl + enter
                            completed: e.ctrlKey ? true : false,
                        });

                        // todo 초기화
                        todo.value = "";
                    };

                    return {
                        todo,
                        addTodo,
                        todolist,
                        deleteTodo,
                        toggleComplted,
                    };
                },
            }).mount("#app");
        </script>
    </body>
</html>
