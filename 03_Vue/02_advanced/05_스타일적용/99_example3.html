<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app">
    <h1 class="title">📌 게시판 목록 v3</h1>

    <section id="input-box">
        <input
                type="text"
                v-model.trim="newPost.title"
                placeholder="새 게시글 제목"
        >
        <input
                type="text"
                v-model.trim="newPost.content"
                placeholder="새 게시글 내용"
        >

        <button class="write-button" @click="createPost">
            작성
        </button>
    </section>

    <ul>
        <li v-for="post in sortedPosts" :key="post.no">
            <div class="post-item" @click="togglePost(post.no)">
                <span>{{ post.no }}. {{ post.title }}</span>
                <span class="toggle-color">
                    {{ selectedPostNo === post.no ? '▲' : '▼' }}
                </span>
            </div>

            <!-- 상세 보기 -->
            <div
                    class="post-content"
                    v-if="selectedPostNo === post.no && editingPostNo !== post.no"
            >
                <h2>{{ post.title }}</h2>
                <p>{{ post.content }}</p>

                <button class="button" @click.stop="startEdit(post)">
                    수정
                </button>
                <button class="button" @click.stop="deletePost(post.no)">
                    삭제
                </button>
                <button class="button" @click.stop="closePost">
                    닫기
                </button>
            </div>

            <!-- 수정 모드 -->
            <div
                    class="post-content"
                    v-if="editingPostNo === post.no"
            >
                <div>
                    <input
                            type="text"
                            v-model.trim="editForm.title"
                            placeholder="게시글 제목 수정"
                    >
                </div>
                <div>
                    <textarea
                            v-model.trim="editForm.content"
                            placeholder="게시글 내용 수정"
                    ></textarea>
                </div>

                <button class="button" @click.stop="saveEdit">
                    저장
                </button>
                <button class="button" @click.stop="cancelEdit">
                    취소
                </button>
            </div>
        </li>
    </ul>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            const posts = ref([
                {
                    no: 1,
                    title: "Vue.js 기초 배우기",
                    content: "Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.",
                },
                {
                    no: 2,
                    title: "자바스크립트 ES6 문법",
                    content: "ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.",
                },
                {
                    no: 3,
                    title: "Node.js와 Express",
                    content: "Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.",
                },
                {
                    no: 4,
                    title: "MongoDB 기본 개념",
                    content: "MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.",
                },
                {
                    no: 5,
                    title: "프론트엔드와 백엔드의 차이",
                    content: "프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.",
                },
                {
                    no: 6,
                    title: "비동기 프로그래밍",
                    content: "JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.",
                },
                {
                    no: 7,
                    title: "Vue Router 사용법",
                    content: "Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.",
                },
                {
                    no: 8,
                    title: "컴포넌트 기반 개발",
                    content: "Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.",
                },
                {
                    no: 9,
                    title: "CSS와 SCSS 차이점",
                    content: "SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.",
                },
                {
                    no: 10,
                    title: "Git과 GitHub 사용법",
                    content: "Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.",
                },
            ]);

            const selectedPostNo = ref(null);
            const editingPostNo = ref(null);

            const newPost = ref({
                title: "",
                content: "",
            });

            const editForm = ref({
                title: "",
                content: "",
            });

            // 최신 순 정렬
            const sortedPosts = computed(() => {
                return [...posts.value].sort((a, b) => b.no - a.no);
            });

            // 내용이 비었는지 확인
            const isEmptyPost = ({ title, content }) => {
                return !title.trim() || !content.trim();
            };

            // 새글 타겟 변수
            const resetNewPost = () => {
                newPost.value = {
                    title: "",
                    content: "",
                };
            };

            // 닫기 버튼 이벤트
            const closePost = () => {
                selectedPostNo.value = null;
                editingPostNo.value = null;
            };

            // 게시글 제목 클릭 이벤트
            const togglePost = (postNo) => {
                if (editingPostNo.value !== null) return;

                selectedPostNo.value =
                    selectedPostNo.value === postNo ? null : postNo;
            };

            // 새글 작성 버튼 이벤트
            const createPost = () => {
                if (isEmptyPost(newPost.value)) {
                    alert("제목과 내용을 모두 입력해줘.");
                    return;
                }

                const nextNo =
                    posts.value.length > 0
                        ? Math.max(...posts.value.map(post => post.no)) + 1
                        : 1;

                const createdPost = {
                    no: nextNo,
                    title: newPost.value.title,
                    content: newPost.value.content,
                };

                posts.value.push(createdPost);
                resetNewPost();
            };

            // 수정 버튼 이벤트
            const startEdit = (post) => {
                editingPostNo.value = post.no;

                editForm.value = {
                    title: post.title,
                    content: post.content,
                };
            };

            // 수정저장 버튼 이벤트
            const saveEdit = () => {
                if (isEmptyPost(editForm.value)) {
                    alert("제목과 내용을 모두 입력해줘.");
                    return;
                }

                // 수정할 인덱스
                const index = posts.value.findIndex(
                    post => post.no === editingPostNo.value
                );
                if (index === -1) return;

                // 최종 값 수정
                posts.value[index] = {
                    ...posts.value[index],
                    title: editForm.value.title,
                    content: editForm.value.content,
                };

                // 수정 후에도 같은 게시글을 계속 보고 있도록 유지
                selectedPostNo.value = editingPostNo.value;
                editingPostNo.value = null;
            };

            // 수정 닫기 이벤트
            const cancelEdit = () => {
                editingPostNo.value = null;
            };

            // 삭제 이벤트
            const deletePost = (postNo) => {
                if (!confirm("정말로 삭제하시겠습니까?")) return;

                posts.value = posts.value.filter(post => post.no !== postNo);

                // 선택된 post 값 리셋
                if (selectedPostNo.value === postNo) {
                    selectedPostNo.value = null;
                }

                if (editingPostNo.value === postNo) {
                    editingPostNo.value = null;
                }
            };

            return {
                posts,
                newPost,
                editForm,
                selectedPostNo,
                editingPostNo,
                sortedPosts,
                togglePost,
                closePost,
                createPost,
                startEdit,
                saveEdit,
                cancelEdit,
                deletePost,
            };
        },
    }).mount("#app");
</script>

<style>
    h1.title {
        text-align: center;
        color: #333;
    }

    ul {
        list-style-type: none;
        padding: 0;
    }

    #input-box {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
    }

    .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
    }

    .post-item:hover {
        background: #f4f4f4;
    }

    .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
    }

    .post-content input,
    .post-content textarea {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 10px;
        padding: 8px;
    }

    .toggle-color {
        color: #a9a9a9;
    }

    .button {
        margin-top: 10px;
        margin-right: 5px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
    }

    button:hover {
        background: #ff4f4f;
    }

    .write-button {
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
    }
</style>
</body>
</html>
