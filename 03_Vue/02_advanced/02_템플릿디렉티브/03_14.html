<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <table>
                <tr>
                    <td>번호</td>
                    <td>이름</td>
                    <td>전화번호</td>
                </tr>
                <tr v-for="(contact, index) in contacts" :key="index">
                    <td>{{index + 1}}</td>
                    <template
                        v-for="(value, key, index) in contact"
                        :key="index"
                    >
                        <td v-if="key === 'name'">{{value}}</td>
                        <td v-if="key === 'tel'">{{value}}</td>
                    </template>
                </tr>
            </table>
        </div>

        <script>
            const { createApp, ref } = Vue;

            createApp({
                setup() {
                    const contacts = ref([
                        { no: 1011, name: "RM", tel: "010-3456-8299" },
                        { no: 1012, name: "정국", tel: "010-3456-8298" },
                        { no: 1013, name: "제이홉", tel: "010-3456-8297" },
                        { no: 1014, name: "슈가", tel: "010-3456-8296" },
                    ]);
                    return { contacts };
                },
            }).mount("#app");
        </script>
    </body>
</html>
