<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- font-awsome 라이브러리 가져오기 -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <!-- Bootstrap CSS 디자인, 레이아웃 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <!-- Bootstrap JS 모달, 드롭다운 -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body class="d-flex p-5" style="height: 100vh">
        <div style="width: 400px">
            <section id="header">
                <p class="fa-2x">
                    <i class="fa-solid fa-user-plus"></i> 회원가입
                </p>
            </section>
            <section id="main">
                <div class="mb-3">
                    <i class="fa-solid fa-user"></i> 사용자 ID:
                    <input type="text" class="form-control" />
                </div>
                <div class="mb-3">
                    <i class="fa-solid fa-lock"></i> 비밀번호:
                    <input type="password" class="form-control" />
                </div>
                <div class="mb-3">
                    <i class="fa-solid fa-lock"></i> 비밀번호 확인:
                    <input type="password" class="form-control" />
                </div>
                <div class="mb-3">
                    <i class="fa-regular fa-envelope"></i> email:
                    <input type="email" class="form-control" />
                </div>
                <div class="mb-3">
                    <i class="fa-solid fa-user-astronaut"></i> 아바타이미지:
                    <input type="file" class="form-control" />
                </div>
            </section>
            <section
                id="footer"
                class="d-flex justify-content-center align-items-center pt-3"
            >
                <button class="btn btn-primary">
                    <i class="fa-solid fa-user-plus"></i> 회원가입
                </button>
            </section>
        </div>
    </body>
</html>
