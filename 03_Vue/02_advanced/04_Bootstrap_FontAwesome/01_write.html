<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- font-awsome 라이브러리 가져오기 -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />

        <!-- Bootstrap CSS 디자인, 레이아웃 -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        />

        <!-- Bootstrap JS 모달, 드롭다운 -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>

    <body>
        <div class="px-5 pt-3">
            <section id="header">
                <p class="fa-2x fw-bold">
                    <i class="fa-regular fa-pen-to-square"></i> 새 글쓰기
                </p>
            </section>
            <section id="main">
                <form>
                    <div class="row">
                        <p>제목</p>
                        <input type="text" class="form-control" />
                    </div>
                    <div class="row">
                        <p>작성자</p>
                        <input type="text" class="form-control" />
                    </div>
                    <div class="row">
                        <p>내용</p>
                        <textarea class="form-control" rows="8"></textarea>
                    </div>
                </form>
            </section>
            <section id="footer" class="mt-2">
                <button class="btn btn-primary">
                    <i class="fa-solid fa-check"></i> 확인
                </button>
                <button class="btn btn-primary">
                    <i class="fa-solid fa-file-circle-xmark"></i> 취소
                </button>
                <button class="btn btn-primary">
                    <i class="fa-solid fa-list"></i> 목록
                </button>
            </section>
        </div>
    </body>
</html>
