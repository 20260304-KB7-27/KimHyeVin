<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <style>
            .btnColor {
                background-color: aqua;
                color: black;
            }
            .btnAlign {
                text-align: center;
                width: 120px;
            }
            .btnBorder {
                border: khaki dashed 1px;
            }
        </style>
    </head>
    <body>
        <div id="app">
            <input type="checkbox" v-model="btnColor" />색상<br />
            <input type="checkbox" v-model="btnAlign" />정렬, 크기<br />
            <input type="checkbox" v-model="btnBorder" />테두리<br />
            <button :class="btnStyle">버튼</button>
        </div>

        <script>
            const { createApp, ref, computed } = Vue;

            createApp({
                setup() {
                    const btnColor = ref(false);
                    const btnAlign = ref(false);
                    const btnBorder = ref(false);

                    const btnStyle = computed(() => ({
                        btnColor: btnColor.value,
                        btnAlign: btnAlign.value,
                        btnBorder: btnBorder.value,
                    }));
                    return { btnColor, btnAlign, btnBorder, btnStyle };
                },
            }).mount("#app");
        </script>
    </body>
</html>
