<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <div id="app">
                1보다 큰 수: <input type="number" v-model="num" /> <br />
                1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
                1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
                1부터 입력한 값까지의 합: <span>{{sum()}}</span><br />
            </div>
        </div>

        <script>
            const { createApp, ref, computed } = Vue;

            createApp({
                setup() {
                    const num = ref(0);
                    const sum = () => {
                        return (num.value * (num.value + 1)) / 2;
                    };
                    return { num, sum };
                },
            }).mount("#app");
        </script>
    </body>
</html>
