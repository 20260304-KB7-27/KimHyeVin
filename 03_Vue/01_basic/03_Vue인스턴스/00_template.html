<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <!-- 
            template
             - 뷰 컴포넌트의 구조를 정의하는 공간
             - 살제 HTML 요소를 만들지 않고 묶고 싶을때 사용
        -->
        <div id="app">
            <template v-if="isLogin">
                <p>환경합니다. 🎈{{userName}}님</p>
                <button @click="logout">로그아웃</button>
            </template>
            <template v-else>
                <p>로그인이 필요합니다.🫥</p>
                <button @click="login">로그인</button>
            </template>
        </div>

        <script>
            const { createApp, ref } = Vue;

            createApp({
                setup() {
                    const isLogin = ref(false);
                    const userName = ref("김혜빈");

                    function login() {
                        isLogin.value = true;
                    }
                    function logout() {
                        isLogin.value = false;
                    }
                    return { isLogin, userName, login, logout };
                },
            }).mount("#app");
        </script>
    </body>
</html>
