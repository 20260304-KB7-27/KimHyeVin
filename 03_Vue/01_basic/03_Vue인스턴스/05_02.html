<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            금액: <input type="text" v-model.number="amount" /> <br />
            <button @click="deposit()">입금</button>
            <button @click="withdraw()">인출</button>
            <br />
            <h3>계좌잔고:{{balance}}</h3>
        </div>

        <script>
            const { createApp, ref, computed } = Vue;

            createApp({
                setup() {
                    const amount = ref(0);
                    const balance = ref(0);

                    const deposit = () => {
                        balance.value += amount.value;
                        amount.value = 0;
                    };
                    const withdraw = () => {
                        if (amount.value < balance.value)
                            balance.value -= amount.value;
                        amount.value = 0;
                    };

                    return { amount, balance, deposit, withdraw };
                },
            }).mount("#app");
        </script>
    </body>
</html>
