<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Options API</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <!-- 기본___ v-bind:속성명="데이터" -->
            <input type="text" v-bind:value="message" />
            <!-- 축약___ :속성명="데이터" -->
            <img :src="imagePath" alt="" />
            <h1 v-bind="{class: h1Class, style:h1Style}">{{h1Text}}</h1>
        </div>

        <script>
            const { createApp, ref } = Vue;
            /**
             * v-bind 디렉티브
             *  - HTML 요소의 속성과 Vue의 데이터를 연결해주는 디렉티브
             */
            createApp({
                setup(props) {
                    // 반응형 변수
                    const message = ref("v-bind 디렉티브");
                    const imagePath = ref(
                        "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR33mv_bI5HmMIdGCxBMLjQ7p8H9ledPQ9XTw&s",
                    );

                    const h1Text = ref("v-bind 디렉티브");
                    const h1class = ref("title-text");
                    const h1Style = ref({
                        color: "blue",
                        fotntWeiht: "bold",
                        textDecoration: "underline",
                    });
                    return { h1Text, h1class, h1Style, message, imagePath };
                },
            }).mount("#app");
        </script>
    </body>
</html>
