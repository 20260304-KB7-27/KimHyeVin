<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Composition</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <div id="app">
                <!-- 
                1000000,500000,200000
                -->
                잔고: <input type="number" v-model.number="balance" />
                <br />
                회원님의 등급:
                <!-- 화살표 표시는  >= 가능 =가 나중으로 가야지 연산자로 인식함 -->
                <span v-if="balance >= 1000000">Gold</span>
                <span v-if="balance >= 500000 && balance < 1000000"
                    >Silver</span
                >
                <span v-if="balance >= 200000 && balance < 500000">Bronze</span>
                <span v-if="balance < 200000">Basic</span>
            </div>
        </div>

        <script>
            const { createApp, ref } = Vue;

            createApp({
                setup() {
                    const balance = ref(0);

                    return { balance };
                },
            }).mount("#app");
        </script>
    </body>
</html>
