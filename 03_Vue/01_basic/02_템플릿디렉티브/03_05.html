<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Vue 3 연습용 Options API</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    </head>
    <body>
        <div id="app">
            <div>
                <h1>취미생활</h1>
                <input
                    type="checkbox"
                    id="exercise"
                    v-model="hobby"
                    value="A"
                />
                <label for="exercise">운동</label>
                <input type="checkbox" id="reading" v-model="hobby" value="B" />
                <label for="reading">독서</label>
                <input type="checkbox" id="music" v-model="hobby" value="C" />
                <label for="music">음악</label>
                <input type="checkbox" id="dance" v-model="hobby" value="D" />
                <label for="dance">댄스</label>
                <input type="checkbox" id="history" v-model="hobby" value="E" />
                <label for="history">역사</label>
            </div>
            <div>
                <h1>상품 분류 선택</h1>
                <select v-model="category">
                    <option value="C01">음료</option>
                    <option value="C02">술</option>
                    <option value="C03">음식</option>
                    <option value="C04">과일</option>
                </select>
            </div>
            <div>
                <p>선택한 취미:{{hobby}}</p>
                <p>선택한 상품 분류:{{category}}</p>
            </div>
        </div>

        <script>
            const { createApp } = Vue;

            createApp({
                name: "App",
                data() {
                    return { hobby: [], category: "" };
                },
                methods: {},
            }).mount("#app");
        </script>
    </body>
</html>
