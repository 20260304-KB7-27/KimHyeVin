<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script>
            window.onload = function () {
                // querySelector - 주어진 css 선택자에 일치하는 첫번째 요소를 선택

                const header1 = document.querySelector("h1");
                header1.style.color = "red";

                const header2 = document.querySelector(".classtest");
                header2.style.color = "orange";

                const header3 = document.querySelector("#idtest");
                header3.style.color = "blue";
            };
        </script>
    </head>
    <body>
        <h1>Header</h1>
        <h1 class="classtest">Header</h1>
        <h1 id="idtest">Header</h1>
    </body>
</html>
