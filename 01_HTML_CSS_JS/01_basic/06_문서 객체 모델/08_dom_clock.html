<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script>
            window.onload = function () {
                // 요소 찾기
                const clock = document.getElementById(`clock`);

                // 밀리초단위~~
                // 오랜만이구만.........
                // 1초 단위로 아래 함수 실행합니다.
                setInterval(function () {
                    let now = new Date();

                    clock.innerHTML = now.toString();
                    console.log(this);
                }, 1000);

                // this
                // 객체에서 this -> 그 객체
                // 이벤트핸들러 -> 이벤트가 발생한 요소
                // 일반 함수   -> window
            };
        </script>
    </head>
    <body>
        <h1 id="clock"></h1>
    </body>
</html>
