<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- defer: HTML 파싱이 끝난뒤 script 실행 -->
        <script>
            // window.onload
            // 웹페이지의 모든 콘텐츠 html/css/image가 로드된 이후에 실행되는 이벤트 핸들러

            window.onload = function () {
                // 요소 선택
                const header = document.getElementById("header");

                header.style.color = "orange";
                header.style.backgroundColor = "red";
                // innerText는 <strong> 태그를 텍스트로 적용함
                // header.innerText = "<strong>Form JavaScript</strong>";

                // innerHTML는 <strong> 태그를 HTML요소로 적용함
                // -> 브라우저에 보이는 텍스트를 기준
                //CSS 랜더링에 영향 받음
                header.innerHTML = "<strong>Form JavaScript</strong>";

                const box = document.getElementById("box");

                console.log(box.innerText);

                // textContent
                // 데이터만 처리할땐 주로 textContent만 사용
            };
        </script>
    </head>

    <body>
        <h1 id="header">Header</h1>
        <div id="box">
            hello
            <span style="display: none">World</span>
        </div>
    </body>
</html>
