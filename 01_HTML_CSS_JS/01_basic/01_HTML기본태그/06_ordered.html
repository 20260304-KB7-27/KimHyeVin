<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Document</title>
    </head>
        <body>
        <!--
            ol 태그
            1. 순서가 있는 목록을 만드는 태그
        -->
        <ol>
            <li>사과</li>
            <li>바나나</li>
            <li>오렌지</li>
            <li>물</li>
        </ol>
        <!--
            ul 태그
            1. 순서가 없는 목록을 만드는 태그
        -->
        <ul>
            <li>사과</li>
            <li>바나나</li>
            <li>오렌지</li>
            <li>물</li>
        </ul>
    </body>
</html>
