<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <!-- 
            block
            줄바꿈, 너비와 높이 설정 가능, 여백/패딩(margin/padding) 설정가능
            기본적으로 부모요소의 전체 너비를 차지

            주요 블록 태그
            div            : 
            p              : 문장
            ul/ol          : 목룍
            form           : 폼 태그
            header/footer : 시멘틱태그
        -->

        <div>첫 번째 div는 새로운 줄에서 시작~</div>
        <div style="background-color: black">
            두 번째 div는 자동 줄바꿈이 있어요~
        </div>
        <div style="width: 200px; height: 50px; background-color: yellow">
            너비랑 높이를 지정했어요~
        </div>

        <div style="border: 1px solid black; padding: 10px">
            <div style="background-color: #f0f0f0; margin-bottom: 10px">
                헤더 영역
            </div>
            <div style="display: flex">
                <div style="background-color: #e0e0e0; width: 30%">
                    사이드바
                </div>
                <div style="background-color: #d0d0d0; width: 70%">
                    메인 콘텐츠 영역
                </div>
            </div>
        </div>
    </body>
</html>
